name: Chore reminder

# Pushes a "check off your chores" notification at 10:00 AM Central on weekdays.
# 10:00 CT = 15:00 UTC during CDT (the whole June–Aug window is CDT). The
# endpoint also guards weekday + before the first day of school, and stops
# itself once school starts.
#
# Required repo secrets (Settings -> Secrets and variables -> Actions):
#   APP_URL      e.g. https://car.smithlets.net  (no trailing slash)
#   CRON_SECRET  must match the CRON_SECRET env var set in Vercel
on:
  schedule:
    - cron: '0 15 * * 1-5' # 10:00 CT, Mon–Fri (GitHub may delay a few min)
  workflow_dispatch: {}

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Send chore reminder
        run: |
          curl -fsS "${{ secrets.APP_URL }}/api/cron/chores-reminder" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
