name: Set chore record

# On-demand backfill/correction of a chore record. Runs on GitHub's runners
# (open internet), so it works even when other environments can't reach the app.
# Triggered manually (or by Claude via the API) with inputs.
#
# Required repo secrets (Settings -> Secrets and variables -> Actions):
#   APP_URL     e.g. https://car.smithlets.net  (no trailing slash)
#   CLAUDE_KEY  must match the CLAUDE_KEY env var set in Vercel
on:
  workflow_dispatch:
    inputs:
      date:
        description: 'Date (YYYY-MM-DD)'
        required: true
      kid:
        description: 'Owen | Zoe | Max | Emma'
        required: true
      tasks:
        description: 'Comma list, e.g. read,mow,art (empty clears the day)'
        required: false
        default: ''

jobs:
  set:
    runs-on: ubuntu-latest
    steps:
      - name: POST record to /api/admin/chores
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CLAUDE_KEY: ${{ secrets.CLAUDE_KEY }}
          DATE: ${{ inputs.date }}
          KID: ${{ inputs.kid }}
          TASKS: ${{ inputs.tasks }}
        run: |
          body=$(jq -n --arg d "$DATE" --arg k "$KID" --arg t "$TASKS" \
            '{date:$d, kid:$k, taskIds:($t|split(",")|map(select(length>0)))}')
          echo "Request: $body"
          resp=$(curl -sS -w "\n%{http_code}" -X POST "${APP_URL%/}/api/admin/chores" \
            -H "Authorization: Bearer $CLAUDE_KEY" \
            -H "Content-Type: application/json" \
            -d "$body")
          echo "Response: $resp"
          [ "$(echo "$resp" | tail -1)" = "200" ] || { echo "::error::non-200 response"; exit 1; }
