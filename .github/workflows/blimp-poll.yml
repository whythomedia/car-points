name: Poll blimp location

# Refreshes the blimp's last-known location cache on a schedule, so the homepage
# box stays populated even when nobody has the app open. Works on Vercel's free
# Hobby plan (whose native cron is limited to once/day).
#
# Required repo secrets (Settings -> Secrets and variables -> Actions):
#   APP_URL      e.g. https://car-points.vercel.app  (no trailing slash)
#   CRON_SECRET  must match the CRON_SECRET env var set in Vercel
on:
  schedule:
    - cron: '*/15 * * * *' # every 15 min (GitHub may delay under load)
  workflow_dispatch: {} # lets you run it manually from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Refresh blimp cache
        run: |
          curl -fsS "${{ secrets.APP_URL }}/api/cron/blimp" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
